name: ikawa_mobile_app
description: IKAWA mobile app shell.
publish_to: "none"
version: 0.1.0+1
resolution: workspace

environment:
  sdk: "^3.11.5"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  permission_handler: ^12.0.1
  ikawa_app_domain:
    path: ../../packages/ikawa_app_domain
  ikawa_ble_transport:
    path: ../../packages/ikawa_ble_transport
  ikawa_protocol_core:
    path: ../../packages/ikawa_protocol_core

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/app_icon.png
    - assets/images/background1.png
    - assets/images/background2.png
    - assets/images/background3.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_icon.png
  remove_alpha_ios: true
